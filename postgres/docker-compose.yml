version: '3.8'

services:
  postgres:
    image: postgres:18.3-bookworm  # Точная версия из дампа
    container_name: VKR_Postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: VKR_Database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 22082004
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
      TZ: Europe/Moscow
      
    ports:
      - "5430:5432"
      
    volumes:
      - postgres_18_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
      - ./logs:/var/log/postgresql
      
    networks:
      - vkr_network
      
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d VKR_Database"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        
    # Ограничение ресурсов
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # pgAdmin для управления (опционально)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vkr_pgadmin_18
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: zuev22082004@gmail.com
      PGADMIN_DEFAULT_PASSWORD: 22082004
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_18_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    networks:
      - vkr_network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  vkr_network:
    driver: bridge

volumes:
  postgres_18_data:
    name: vkr_postgres_18_data
  pgadmin_18_data:
    name: vkr_pgadmin_18_data